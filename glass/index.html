            <div class="floatOnGlass introTxt" id="textIntoBox">
              <span><strong>Full-Stack</strong> <b>Developer</b></span>
              <span><b>Automation</b> <strong>Engineer</strong></span>
              <span><strong>Digital</strong> <b>Architect</b></span>
            </div>
            <div class="floatOnGlass glassFloat descText flex c">
              <div class="tabs flex">
                <p><span fs=".8em">Experience</span> <strong>6 Years+</strong></p>
                <div class="lineMargin" w="2px" h="20px" bg="#333" m="5px" style="border-radius: 9px;"></div>

              <p class="introPara">
                Full-stack engineer & automation specialist. I build <span >complete platforms</span> for your company, <span >custom bots</span>
                for your tasks. I also have worked upon <span >J&K Government</span> Kirayedar Portal.

            </div>
          </div>

        </div>

        <div class="socialPan flex">
          <a href="https://linked.in.com" target="_blank">
            <div class="iconPan flex">
              <img src="https://www.svgrepo.com/show/512419/linkedin-161.svg" alt="">
            </div>
          </a>
          <a href="https://www.youtube.com/@AwesomeCode" target="_blank">
            <div class="iconPan flex">
              <img src="https://www.svgrepo.com/show/513089/youtube-168.svg" alt="">

          <a href="https://www.instagram.com/web_dev.priyanshu/" target="_blank">
            <div class="iconPan flex">
              <img src="https://www.svgrepo.com/show/521711/instagram.svg" alt="">
            </div>
          </a>
          <a href="https://wa.me/918578069916" target="_blank">

            </div>
          </a>

    </div>
    <div id="nav">
      <!-- <input type="range" id="pid" min="1" max="100">
      <input type="range" id="offset" min="1" max="100"> -->
    </div>
  </div>


  <script>
    var offset = op("#offset");
    var pid = op("#pid");
    resetFormat();
    document.querySelectorAll("*[id]").forEach(val => {
      var id = val.getAttribute("id");
      window[id] = val;
    })

    var glassHolder = opp(".glassHolder");
    glassHolder.forEach(val => {
      val.addEventListener("mousemove", (e) => {
        // log(e)

        var x = e.offsetX;
        var y = e.offsetY;
        x = (x - 160) / 160 * 20;
        y = (y - 200) / 200 * 20;
        moveVal(val, -x, -y);
      })

      val.addEventListener("mouseout", () => {
        val.style.transition = "all .5s";
        val.style.transform = `perspective(1500px) rotateX(0deg) rotateY(0deg)`;
      })

      val.addEventListener("mouseenter", () => {
        val.style.transition = "all .15s";
        // val.style.transform=`perspective(1500px) rotateX(0deg) rotateY(0deg)`;

        setTimeout(() => { val.style.transition = "none"; }, 150)
      })
    })




    try {


      let gyroscope = new Gyroscope({ frequency: 60 }); // Set reading frequency

      gyroscope.addEventListener("reading", (e) => {

        var x = gyroscope.y * 20;
        var y = gyroscope.x * 20;

        moveVal(glassHolder[0], -x, -y);

      });

      gyroscope.start();
    }
    catch (e) {
      // document.body.innerText = e;
    }

    function moveVal(val, x, y) {
      val.style.transform = `perspective(1500px) rotateX(${-y}deg) rotateY(${x}deg)`;
    }

  </script>
</body>
<script src="js/skillSwipeElement.js"></script>


</html>
