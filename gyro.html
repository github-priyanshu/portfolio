    <script>

        var str="ioui";

        let gyroscope = new Gyroscope({ frequency: 60 }); // Set reading frequency

        gyroscope.addEventListener("reading", (e) => {
            str=`
            Angular velocity along the X-axis ${gyroscope.x});
            Angular velocity along the Y-axis ${gyroscope.y});
            Angular velocity along the Z-axis ${gyroscope.z});
            `
            document.body.innerText=str;
        });

        gyroscope.start();
    }
    catch(e){
        document.body.innerText=e;
    }
    </script>
